services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: env-analysis-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD:-YourStrong@Passw0rd}
    ports:
      - "14333:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" -C
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  web:
    build:
      context: ./env-analysis-project
      dockerfile: Dockerfile
    container_name: env-analysis-web
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__env_analysis_projectContext: Server=db,1433;Database=EnvAnalysisDB;User ID=sa;Password=${SA_PASSWORD:-YourStrong@Passw0rd};Encrypt=False;TrustServerCertificate=True;MultipleActiveResultSets=True
      Jwt__Key: ${JWT_KEY:-aZ3f9KQ2mR8LxWc1P0EJ4H6VYyTn5U7sDkBqOpiMNeAFrIStCghX2L9ew0uJZR8m}
      Jwt__Issuer: EnvAnalysis
      Jwt__Audience: EnvAnalysisAudience
      Jwt__ExpirationMinutes: 120
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  sql_data:
